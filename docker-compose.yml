version: '3.8'

services:
  api:
    build: .
    container_name: gpsim-ai-api
    ports:
      - "8060:8060"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8060 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
